name: Daily Data Sync

on:
  schedule:
    # Run daily at 17:00 UTC (02:00 JST)
    - cron: "0 17 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync PubMed papers
        run: npx tsx scripts/sync-pubmed.ts

      - name: Fetch RSS news
        run: npx tsx scripts/fetch-rss.ts

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/papers.json data/news.json
          git commit -m "chore: daily data sync $(date -u +%Y-%m-%d)"
          git push
